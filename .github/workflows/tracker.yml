name: Canyon Price Tracker

on:
  schedule:
    # Corre cada 6 horas (UTC): 00:00, 06:00, 12:00, 18:00
    # En CDMX (UTC-6): 18:00, 00:00, 06:00, 12:00
    - cron: "0 0,6,12,18 * * *"

  # También permite correrlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Para poder hacer git push del historial

    steps:
      # 1. Descargar el repositorio
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Instalar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Instalar dependencias Python
      - name: Install Python dependencies
        run: pip install playwright

      # 4. Instalar los navegadores de Playwright
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # 5. Correr el scraper
      - name: Run scraper
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
        run: python scraper.py

      # 6. Guardar historial y screenshot de vuelta en el repo
      - name: Commit price history
        run: |
          git config user.name  "canyon-bot"
          git config user.email "canyon-bot@users.noreply.github.com"
          git add price_history.json last_check.png || true
          git diff --staged --quiet || git commit -m "chore: price check $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
