<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canyon Tracker — Endurace AllRoad</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header {
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    header p {
      font-size: 0.82rem;
      color: #888;
      margin-top: 4px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 12px;
      padding: 18px;
    }
    .card .label {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }
    .card .sub {
      font-size: 0.78rem;
      color: #666;
      margin-top: 4px;
    }

    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .pill.green { background: #1a3a2a; color: #4caf82; border: 1px solid #2d6b4a; }
    .pill.red   { background: #3a1a1a; color: #e05252; border: 1px solid #6b2d2d; }
    .pill.gray  { background: #2a2a2a; color: #888;    border: 1px solid #444; }

    .chart-card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .chart-card h2 {
      font-size: 0.85rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    th {
      text-align: left;
      padding: 8px 10px;
      color: #666;
      border-bottom: 1px solid #2a2a45;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 9px 10px;
      border-bottom: 1px solid #1e1e35;
      color: #ccc;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e1e35; }

    .change-up   { color: #e05252; }
    .change-down { color: #4caf82; }
    .change-none { color: #666; }

    .screenshot {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a45;
      margin-top: 16px;
    }
    .screenshot img { width: 100%; display: block; }
    .screenshot .caption {
      font-size: 0.75rem;
      color: #666;
      padding: 8px 12px;
      background: #1a1a2e;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Canyon Endurace AllRoad</h1>
    <p>Silver Mercury · Talla S · canyon.com/es-mx</p>
  </header>

  <div class="cards" id="summary-cards">
    <div class="card">
      <div class="label">Precio actual</div>
      <div class="value" id="current-price">—</div>
      <div class="sub" id="price-change">—</div>
    </div>
    <div class="card">
      <div class="label">Talla S</div>
      <div class="value" id="size-status" style="font-size:1.1rem;padding-top:8px">—</div>
      <div class="sub" id="last-check">—</div>
    </div>
  </div>

  <div class="chart-card">
    <h2>Historial de precio</h2>
    <canvas id="priceChart" height="180"></canvas>
  </div>

  <div class="chart-card">
    <h2>Todos los registros</h2>
    <div id="table-container"><p class="empty">Cargando…</p></div>
  </div>

  <div class="screenshot">
    <img id="screenshot-img" src="last_check.png" alt="Último screenshot de Canyon MX"
         onerror="this.parentElement.style.display='none'" />
    <div class="caption">Último screenshot del scraper</div>
  </div>

</div>

<script>
async function loadData() {
  let history = [];
  try {
    const res = await fetch("price_history.json?t=" + Date.now());
    history = await res.json();
  } catch {
    document.getElementById("table-container").innerHTML =
      '<p class="empty">No hay datos aún. Corre el workflow por primera vez en GitHub Actions.</p>';
    return;
  }

  if (!history.length) {
    document.getElementById("table-container").innerHTML =
      '<p class="empty">Sin registros todavía.</p>';
    return;
  }

  const last  = history[history.length - 1];
  const prev  = history.length > 1 ? history[history.length - 2] : null;
  const diff  = prev ? last.price_usd - prev.price_usd : 0;
  const pct   = prev ? (diff / prev.price_usd * 100).toFixed(1) : null;

  // Cards
  document.getElementById("current-price").textContent =
    "$" + last.price_usd.toLocaleString("en-US") + " USD";

  if (pct !== null && Math.abs(diff) >= 1) {
    const arrow = diff < 0 ? "▼" : "▲";
    const cls   = diff < 0 ? "change-down" : "change-up";
    document.getElementById("price-change").innerHTML =
      `<span class="${cls}">${arrow} $${Math.abs(diff).toFixed(0)} (${Math.abs(pct)}%)</span> vs anterior`;
  } else {
    document.getElementById("price-change").textContent = "Sin cambio vs anterior";
  }

  const sizePill = last.size_available
    ? '<span class="pill green">✅ Disponible</span>'
    : '<span class="pill red">❌ Sin stock</span>';
  document.getElementById("size-status").innerHTML = sizePill;
  document.getElementById("last-check").textContent = "Revisado: " + last.timestamp;

  // Chart
  const labels = history.map(e => e.timestamp.replace(" UTC", "").slice(5));
  const prices = history.map(e => e.price_usd);

  const ctx = document.getElementById("priceChart").getContext("2d");
  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Precio (USD)",
        data: prices,
        borderColor: "#6c63ff",
        backgroundColor: "rgba(108,99,255,0.12)",
        pointBackgroundColor: history.map(e =>
          e.size_available ? "#4caf82" : "#e05252"
        ),
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const h = history[ctx.dataIndex];
              const s = h.size_available ? "✅ Talla S disponible" : "❌ Talla S sin stock";
              return [`$${ctx.raw} USD`, s];
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#666", maxRotation: 40, font: { size: 10 } },
          grid:  { color: "#1e1e35" },
        },
        y: {
          ticks: {
            color: "#666",
            callback: v => "$" + v.toLocaleString(),
          },
          grid: { color: "#1e1e35" },
        }
      }
    }
  });

  // Tabla (más reciente primero)
  const reversed = [...history].reverse();
  const rows = reversed.map((e, i) => {
    const orig = history[history.indexOf(e)];
    const prevEntry = history[history.indexOf(e) - 1];
    let changeHtml = '<span class="change-none">—</span>';
    if (prevEntry) {
      const d   = e.price_usd - prevEntry.price_usd;
      const p   = (d / prevEntry.price_usd * 100).toFixed(1);
      if (Math.abs(d) >= 1) {
        const cls = d < 0 ? "change-down" : "change-up";
        const arr = d < 0 ? "▼" : "▲";
        changeHtml = `<span class="${cls}">${arr} $${Math.abs(d).toFixed(0)} (${Math.abs(p)}%)</span>`;
      }
    }
    const sizeHtml = e.size_available
      ? '<span class="pill green" style="font-size:.7rem">✅</span>'
      : '<span class="pill red"   style="font-size:.7rem">❌</span>';
    return `<tr>
      <td>${e.timestamp}</td>
      <td>$${e.price_usd.toLocaleString()} USD</td>
      <td>${changeHtml}</td>
      <td>${sizeHtml}</td>
    </tr>`;
  }).join("");

  document.getElementById("table-container").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Fecha/Hora</th>
          <th>Precio</th>
          <th>Cambio</th>
          <th>Talla S</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

loadData();
</script>
</body>
</html>
